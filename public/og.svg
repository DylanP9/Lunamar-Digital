<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="sphere" cx="40%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#26324d"/>
      <stop offset="55%" stop-color="#0a0f1c"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="crescent" x1="0" y1="0.1" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#dfe6ff"/>
      <stop offset="100%" stop-color="#5b8cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3461ff" stop-opacity="0.4"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#04050a" stop-opacity="0"/>
    </radialGradient>
    <mask id="cres-mask">
      <rect x="480" y="100" width="240" height="240" fill="black"/>
      <circle cx="600" cy="220" r="92" fill="white"/>
      <circle cx="636" cy="200" r="84" fill="black"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="#04050a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="600" cy="220" r="92" fill="url(#sphere)"/>
  <g mask="url(#cres-mask)"><circle cx="600" cy="220" r="92" fill="url(#crescent)"/></g>
  <text x="600" y="450" text-anchor="middle" font-family="Space Grotesk, Inter, sans-serif" font-size="64" font-weight="600" letter-spacing="16" fill="#ffffff">LUNAMAR</text>
  <text x="600" y="500" text-anchor="middle" font-family="Space Grotesk, Inter, sans-serif" font-size="30" font-weight="500" letter-spacing="22" fill="#5b8cff">DIGITAL</text>
  <text x="600" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" fill="#b9c2da">Websites. Marketing. Growth.</text>
</svg>
